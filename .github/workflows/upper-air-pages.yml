name: Update and publish upper-air dashboard

on:
  workflow_dispatch:
  schedule:
    # After the twice-daily source refresh window.
    - cron: "30 15 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: upper-air-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dashboard.txt

      - name: Install dashboard dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dashboard.txt

      - name: Refresh upper-air data
        run: python scripts/run_upper_air_monitor.py --refresh --years 6

      - name: Build social graphics and public site
        run: |
          python scripts/build_upper_air_social_graphics.py
          python scripts/build_upper_air_public_site.py
          test -s upper-air-site/dist/index.html
          test -s upper-air-site/dist/og.png
          grep -q "SOUNDING AVAILABILITY" upper-air-site/dist/index.html

      - name: Set custom domain
        run: |
          printf '%s\n' 'soundings.wall.cloud' > upper-air-site/dist/CNAME
          touch upper-air-site/dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: upper-air-site/dist

      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
