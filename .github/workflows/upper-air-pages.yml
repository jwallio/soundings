name: Update and publish upper-air dashboard

on:
  workflow_dispatch:
  schedule:
    # Cover the expected 00Z and 12Z NCO message windows.
    - cron: "45 1,3,13,15 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: upper-air-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dashboard.txt

      - name: Install dashboard dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dashboard.txt

      - name: Refresh upper-air data
        run: |
          set -o pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event.schedule }}" == "45 15 * * *" ]]; then
            export FULL_ARCHIVE_REFRESH=true
          else
            export FULL_ARCHIVE_REFRESH=false
          fi
          echo "FULL_ARCHIVE_REFRESH=${FULL_ARCHIVE_REFRESH}" >> "$GITHUB_ENV"
          for attempt in 1 2 3; do
            echo "Refresh attempt ${attempt}/3"
            refresh_args=(--refresh --years 6)
            if [[ "${FULL_ARCHIVE_REFRESH}" != "true" ]]; then
              refresh_args+=(--skip-igra)
            fi
            if python scripts/run_upper_air_monitor.py "${refresh_args[@]}"; then
              exit 0
            fi
            if [ "${attempt}" -lt 3 ]; then
              delay=$((30 * 2 ** (attempt - 1)))
              echo "Refresh failed; waiting ${delay} seconds before retry."
              sleep "${delay}"
            fi
          done
          echo "Upper-air refresh failed after 3 attempts." >&2
          exit 1

      - name: Build social graphics and public site
        run: |
          if [[ "${FULL_ARCHIVE_REFRESH:-false}" == "true" ]]; then
            python scripts/build_upper_air_social_graphics.py
          else
            echo "Skipping full social-graphics rebuild for NCO-only refresh."
          fi
          python scripts/build_upper_air_public_site.py
          test -s upper-air-site/dist/index.html
          test -s upper-air-site/dist/og.png
          grep -q "SOUNDING AVAILABILITY" upper-air-site/dist/index.html

      - name: Set custom domain
        run: |
          printf '%s\n' 'soundings.wall.cloud' > upper-air-site/dist/CNAME
          touch upper-air-site/dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: upper-air-site/dist

      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
